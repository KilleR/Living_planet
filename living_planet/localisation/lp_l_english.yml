  d_living_planet_energy: "Energetic Ganglia"
  d_living_planet_energy_desc: "Cohesive neural networks which constantly pulse with power, amplifying the strength of the Living Planet's own neurons"
  d_living_planet_rare: "Exotic Matter Sifters"
