  d_living_planet_unity: "Planetary Preservation Vacuoles"
  d_living_planet_unity_desc: "Great chambers within the Living Planet, dedicated to preserving curious indigestible parts of consumed planets."
  d_living_planet_megastructure: "Artificial Geostrata"
