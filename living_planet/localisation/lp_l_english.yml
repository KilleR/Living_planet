  lp_situation_growth_desc: "As the living planet grows, we will get opportunities to decide various evolutionary paths.\n\nFind habitable planets and devour them to grow.\n\nWe have [root.lp_pm_amount] $r_lp_planetary_matter$"
  lp_stage_growing: "We are processing $r_lp_planetary_matter$ in order to grow."

  lp_situation_growth_approach_standard: "Consume"
  lp_situation_growth_approach_standard_desc: "Process $r_lp_planetary_matter$ to increase our size."
  lp_situation_growth_pause_desc: "We have no $r_lp_planetary_matter$!\nThe situation will pause until we have more.\n['concept_lp_devour_planet'] to generate more."

  lp_situation_growth_gain: "+1 £planetsize£ $concept_planet_size$"

